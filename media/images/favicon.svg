    }
  </style>
  <rect class="bg" width="64" height="64" rx="14"/>
  <text class="txt" x="14" y="43" font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-weight="700" letter-spacing="-1">V<tspan class="dot">&amp;</tspan>T</text>
</svg>
