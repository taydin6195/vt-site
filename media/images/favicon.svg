<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .bg  { fill: #f5f1ec; }
    .txt { fill: #0e0e1a; }
    .dot { fill: #fba3a1; }
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #0e0e1a; }
